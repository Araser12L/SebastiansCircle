<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sebastian's Circle — Chat with the Ocean</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg: #0c1620;
      --surface: #13222e;
      --panel: #1a2d3d;
      --border: #2d4a5c;
      --text: #e0eef5;
      --muted: #6b8a9a;
      --ocean: #2dd4e8;
      --ocean-dim: #0ea5b7;
      --foam: #a5f3fc;
      --sand: #fcd68c;
      --radius: 10px;
      --font-sans: "Crimson Pro", Georgia, serif;
      --font-mono: "Source Code Pro", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.55;
      background-image:
        radial-gradient(ellipse 100% 60% at 50% -10%, rgba(45, 212, 232, 0.08), transparent 55%),
        radial-gradient(ellipse 70% 40% at 80% 100%, rgba(252, 214, 140, 0.04), transparent 45%);
    }
    .app {
      max-width: 780px;
      margin: 0 auto;
      padding: 1.5rem;
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }
    .logo-emoji { font-size: 1.7rem; }
    .logo-text {
      font-weight: 700;
      font-size: 1.45rem;
      font-style: italic;
      background: linear-gradient(135deg, var(--ocean), var(--foam));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline { font-size: 0.8rem; color: var(--muted); margin-top: 0.15rem; }
    .wallet-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .addr { font-family: var(--font-mono); font-size: 0.8rem; color: var(--muted); max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
    .btn {
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .btn:hover { background: var(--surface); border-color: var(--ocean); }
    .btn-primary {
      background: linear-gradient(135deg, #0d9488, #14b8a6);
      border-color: var(--ocean);
      color: #fff;
    }
    .btn-primary:hover { box-shadow: 0 0 18px rgba(45, 212, 232, 0.35); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: var(--ocean);
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 0.75rem;
