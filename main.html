<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sebastian's Circle — Chat with the Ocean</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg: #0c1620;
      --surface: #13222e;
      --panel: #1a2d3d;
      --border: #2d4a5c;
      --text: #e0eef5;
      --muted: #6b8a9a;
      --ocean: #2dd4e8;
      --ocean-dim: #0ea5b7;
      --foam: #a5f3fc;
      --sand: #fcd68c;
      --radius: 10px;
      --font-sans: "Crimson Pro", Georgia, serif;
      --font-mono: "Source Code Pro", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.55;
      background-image:
        radial-gradient(ellipse 100% 60% at 50% -10%, rgba(45, 212, 232, 0.08), transparent 55%),
        radial-gradient(ellipse 70% 40% at 80% 100%, rgba(252, 214, 140, 0.04), transparent 45%);
    }
    .app {
      max-width: 780px;
      margin: 0 auto;
      padding: 1.5rem;
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }
    .logo-emoji { font-size: 1.7rem; }
    .logo-text {
      font-weight: 700;
      font-size: 1.45rem;
      font-style: italic;
      background: linear-gradient(135deg, var(--ocean), var(--foam));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline { font-size: 0.8rem; color: var(--muted); margin-top: 0.15rem; }
    .wallet-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .addr { font-family: var(--font-mono); font-size: 0.8rem; color: var(--muted); max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
    .btn {
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .btn:hover { background: var(--surface); border-color: var(--ocean); }
    .btn-primary {
      background: linear-gradient(135deg, #0d9488, #14b8a6);
      border-color: var(--ocean);
      color: #fff;
    }
    .btn-primary:hover { box-shadow: 0 0 18px rgba(45, 212, 232, 0.35); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: var(--ocean);
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.65rem;
      text-align: center;
    }
    .stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-family: var(--font-mono); font-size: 0.95rem; margin-top: 0.2rem; }
    input[type="text"], input[type="number"], textarea {
      width: 100%;
      font-family: var(--font-mono);
      font-size: 0.88rem;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    textarea { min-height: 60px; resize: vertical; }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.25rem; }
    .form-row { margin-bottom: 0.7rem; }
    .msg { font-size: 0.85rem; padding: 0.5rem; border-radius: var(--radius); margin-top: 0.5rem; }
    .msg.err { background: rgba(239, 68, 68, 0.12); color: #f87171; }
    .msg.ok { background: rgba(34, 197, 94, 0.12); color: #4ade80; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .tab {
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-weight: 600;
    }
    .tab.active { background: var(--panel); color: var(--ocean); border-color: var(--ocean); }
    .tab:hover:not(.active) { color: var(--text); }
    .tab-content { display: none; }
    .tab-content.visible { display: block; }
    .wave-list, .bottle-list {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }
    .wave-item, .bottle-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    .wave-item:last-child, .bottle-item:last-child { border-bottom: none; }
    .wave-id, .bottle-id { color: var(--ocean); word-break: break-all; }
    .tide-info { font-size: 0.85rem; color: var(--muted); margin-top: 0.5rem; }
    .hash-display { word-break: break-all; font-size: 0.75rem; color: var(--foam); }
    .section-note { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.75rem; line-height: 1.5; }
    .wave-detail, .bottle-detail { padding: 0.6rem; background: var(--surface); border-radius: var(--radius); margin-bottom: 0.5rem; border-left: 3px solid var(--ocean); }
    .shore-list { font-family: var(--font-mono); font-size: 0.8rem; }
    .shore-item { padding: 0.4rem 0; border-bottom: 1px solid var(--border); }
    .constants-box { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.5rem; margin-top: 0.5rem; }
    .constant-item { padding: 0.4rem; background: var(--surface); border-radius: 6px; font-size: 0.8rem; }
    .constant-item span { color: var(--ocean); }
    footer a { color: var(--ocean); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    .hash-output-wrap { margin-top: 0.5rem; padding: 0.5rem; background: var(--surface); border-radius: 6px; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">
        <span class="logo-emoji">🌊</span>
        <div>
          <div class="logo-text">Sebastian's Circle</div>
          <div class="tagline">Chat with the ocean — waves, bottles, shore whispers</div>
        </div>
      </div>
      <div class="wallet-row">
        <span id="wallet-addr" class="addr">—</span>
        <button id="btn-connect" class="btn">Connect</button>
      </div>
    </header>

    <div class="card">
      <h2>Contract</h2>
      <div class="form-row">
        <label>SeaSideDreams contract address</label>
        <input type="text" id="contract-address" placeholder="0x…" />
      </div>
      <button id="btn-set-contract" class="btn btn-primary">Set contract</button>
      <div id="contract-msg"></div>
    </div>

    <div class="card">
      <h2>Ocean stats</h2>
      <div class="stats-row">
        <div class="stat"><div class="stat-label">Waves</div><div id="stat-waves" class="stat-value">—</div></div>
        <div class="stat"><div class="stat-label">Bottles</div><div id="stat-bottles" class="stat-value">—</div></div>
        <div class="stat"><div class="stat-label">Tide epoch</div><div id="stat-tide" class="stat-value">—</div></div>
        <div class="stat"><div class="stat-label">Blocks to tide</div><div id="stat-blocks-tide" class="stat-value">—</div></div>
        <div class="stat"><div class="stat-label">Paused</div><div id="stat-paused" class="stat-value">—</div></div>
      </div>
    </div>

    <div class="card">
      <h2>Chat with the ocean</h2>
      <div class="tabs">
        <button class="tab active" data-tab="wave">Cast wave</button>
        <button class="tab" data-tab="bottle">Cast bottle</button>
        <button class="tab" data-tab="whisper">Shore whisper</button>
        <button class="tab" data-tab="signal">Lighthouse signal</button>
      </div>

      <div id="panel-wave" class="tab-content visible">
        <div class="form-row">
          <label>Wave ID (bytes32 hex, or leave empty to generate from message)</label>
          <input type="text" id="wave-id" placeholder="0x… or type message below" />
        </div>
        <div class="form-row">
          <label>Message (hashed to content hash if wave ID empty)</label>
          <textarea id="wave-message" placeholder="Your message to the ocean…"></textarea>
        </div>
        <button id="btn-cast-wave" class="btn btn-primary">Cast wave</button>
      </div>

      <div id="panel-bottle" class="tab-content">
        <div class="form-row">
          <label>Bottle ID (bytes32 hex, or leave empty to generate)</label>
          <input type="text" id="bottle-id" placeholder="0x…" />
        </div>
        <div class="form-row">
          <label>Message (hashed to message hash)</label>
          <textarea id="bottle-message" placeholder="Message in a bottle…"></textarea>
        </div>
        <p class="tide-info">Fee: 0.001 ETH (send with transaction).</p>
        <button id="btn-cast-bottle" class="btn btn-primary">Cast bottle</button>
      </div>

      <div id="panel-whisper" class="tab-content">
        <div class="form-row">
          <label>Shore ID (bytes32 hex or name — hashed as "SeaSideDreams_Shore_&lt;name&gt;")</label>
          <input type="text" id="whisper-shore" placeholder="e.g. sunset-beach or 0x…" />
        </div>
        <div class="form-row">
          <label>Whisper (hashed to whisper hash)</label>
          <input type="text" id="whisper-message" placeholder="Whisper to the shore…" />
        </div>
        <button id="btn-whisper" class="btn btn-primary">Shore whisper</button>
      </div>

      <div id="panel-signal" class="tab-content">
        <div class="form-row">
          <label>Signal ID (bytes32 hex)</label>
          <input type="text" id="signal-id" placeholder="0x…" />
        </div>
        <div class="form-row">
